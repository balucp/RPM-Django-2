name: License NOTICE file generation
on:
  pull_request:
    branches:
      - main
      
permissions:
  contents: write
  pull-requests: write

jobs:
  license-check:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      with:
        ref: ${{ github.event.pull_request.head.ref }}
        repository: ${{ github.event.pull_request.head.repo.full_name }}
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}
        

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11' 
    
    - name: Run license checker
      run: |
        rm -rf NOTICE
        chmod +x notice_generator.sh
        ./notice_generator.sh
        ls -la
        
    - name: Check for changes
      id: check_changes
      run: |
        if git diff --quiet -- NOTICE; then
          echo "No changes to the NOTICE file"
          echo "changes=false" >> $GITHUB_OUTPUT
        else
          echo "NOTICE file was updated"
          echo "changes=true" >> $GITHUB_OUTPUT
        fi
        
    - name: Commit and push NOTICE file
      if: steps.check_changes.outputs.changes == 'true'
      run: |
        git config --global user.name 'GitHub Actions'
        git config --global user.email 'actions@github.com'
        
        git add NOTICE
        git commit -m "Update NOTICE file with latest dependencies"
        git push origin ${{ github.event.pull_request.head.ref }}
        